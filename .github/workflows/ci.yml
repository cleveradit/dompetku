name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: testing
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, pdo_mysql, redis, gd, zip, intl
          coverage: none

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          DB_HOST: 127.0.0.1
          REDIS_HOST: 127.0.0.1

      # Urutan gerbang sesuai 01-ARCHITECTURE.md: pint -> larastan -> pest
      - name: Pint
        run: vendor/bin/pint --test

      - name: Larastan
        run: vendor/bin/phpstan analyse --memory-limit=1G --no-progress

      - name: Pest
        run: php artisan test
        env:
          DB_HOST: 127.0.0.1
          DB_USERNAME: root
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1

      - name: Composer audit
        run: composer audit

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint resources/js

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: NPM audit (high/critical)
        run: npm audit --audit-level=high

  e2e:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: dompetku
          MYSQL_ROOT_PASSWORD: password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -ppassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
      mailpit:
        image: axllent/mailpit:latest
        ports:
          - 8025:8025
          - 1025:1025
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, pdo_mysql, redis, gd, zip, intl
          coverage: none

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          composer install --prefer-dist --no-interaction --no-progress
          npm ci

      - name: Prepare app
        run: |
          cp .env.example .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/; s/^DB_USERNAME=.*/DB_USERNAME=root/; s/^REDIS_HOST=.*/REDIS_HOST=127.0.0.1/; s/^MAIL_HOST=.*/MAIL_HOST=127.0.0.1/' .env
          echo "AUTH_WRITES_PER_MINUTE=1000" >> .env
          php artisan key:generate
          php artisan migrate --force
          npm run build
          php artisan serve --host=0.0.0.0 --port=80 &

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke (360/768/1280, light & dark)
        run: npx playwright test
        env:
          E2E_BASE_URL: 'http://127.0.0.1'
          E2E_MAILPIT_API: 'http://127.0.0.1:8025'
